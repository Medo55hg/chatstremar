<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEX vs 89 - Smooth Flip</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at center, #0f1328, #050510);
    font-family:Tahoma, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:white;
    overflow:hidden;
}

/* إعلانات */
.ad{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:170px;
    height:65vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    background:linear-gradient(180deg,#111,#000);
    border-radius:20px;
    line-height:1.7;
}

.ad-left{ left:10px; }
.ad-right{ right:10px; }

/* الوسط */
.center{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* الشعار */
.logo{
    width:220px;
    margin-bottom:30px;
}

/* العملة */
.coin-container{
    perspective:1200px;
}

.coin{
    width:240px;
    height:240px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 3.5s cubic-bezier(.25,.8,.25,1); /* 3.5 ثانية */
}

.side{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    font-weight:900;
    backface-visibility:hidden;
    text-shadow:0 0 20px #000;
}

.dex{
    background:radial-gradient(circle,#00eaff,#0077ff);
}

.nine{
    background:radial-gradient(circle,#ff0033,#aa0000);
    transform:rotateY(180deg);
}

/* زر */
button{
    margin-top:35px;
    padding:15px 45px;
    font-size:22px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:#00eaff;
    color:#000;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}
</style>
</head>

<body>

<div class="ad ad-left">
😂 مساحة إعلانية<br>89$ فقط
</div>

<div class="ad ad-right">
🚀 إعلان VIP<br>89$ لا تفاصل
</div>

<div class="center">

<img src="https://i.postimg.cc/j5d9P1gF/dda42797-92c6-437f-9b3c-8fb1117e0655-fullsize.jpg" class="logo">

<div class="coin-container">
    <div class="coin" id="coin">
        <div class="side dex">DEX</div>
        <div class="side nine">89</div>
    </div>
</div>

<button onclick="flipCoin()">FLIP</button>

</div>

<audio id="flipSound" src="https://assets.mixkit.co/sfx/preview/mixkit-fast-coin-flip-1933.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-video-game-win-2016.mp3"></audio>

<script>
let totalRotation = 0;

function flipCoin(){
    const coin = document.getElementById("coin");
    const flipSound = document.getElementById("flipSound");
    const winSound = document.getElementById("winSound");

    flipSound.currentTime = 0;
    flipSound.play();

    const result = Math.random() < 0.5 ? 0 : 180;
    totalRotation += 1800 + result;

    coin.style.transform = `rotateY(${totalRotation}deg)`;

    setTimeout(()=>{
        winSound.play();
    },3500); // بعد انتهاء اللفة
}
</script>

</body>
</html>
