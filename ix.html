<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEX vs 89 - لعبة التقليب الاحترافية</title>
    
    <!-- Font Awesome للإيقاعات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 30% 50%, #1a1f3a, #0a0a1a);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* خلفية متحركة بنقاط مضيئة */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg"><circle cx="5" cy="5" r="1" fill="rgba(255,255,255,0.2)"/><circle cx="25" cy="15" r="1.5" fill="rgba(0,234,255,0.3)"/><circle cx="15" cy="25" r="1" fill="rgba(255,0,51,0.3)"/></svg>');
            animation: twinkle 4s infinite;
            pointer-events: none;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* تحسين الإعلانات */
        .ad {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 180px;
            height: 65vh;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(145deg, #1e1e2e, #0a0a14);
            border-radius: 30px;
            line-height: 1.8;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 2px 5px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            backdrop-filter: blur(5px);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .ad:hover {
            transform: translateY(-50%) scale(1.02);
            border-color: gold;
            box-shadow: 0 20px 45px rgba(0,234,255,0.3);
        }

        .ad-left { left: 20px; }
        .ad-right { right: 20px; }

        .ad i {
            font-size: 40px;
            margin-bottom: 15px;
            color: gold;
            text-shadow: 0 0 15px #00eaff;
        }

        .ad small {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
        }

        /* الوسط */
        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        /* تحسين الشعار */
        .logo {
            width: 250px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(0,234,255,0.6));
            border-radius: 20px;
            transition: transform 0.3s;
        }

        .logo:hover {
            transform: rotate(5deg) scale(1.05);
        }

        /* تحسين العملة */
        .coin-container {
            perspective: 1500px;
            margin: 20px 0;
            position: relative;
        }

        /* تأثير توهج حول العملة */
        .coin-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,234,255,0.2) 0%, transparent 70%);
            z-index: -1;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .coin {
            width: 260px;
            height: 260px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 3.2s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 900;
            backface-visibility: hidden;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 -5px 15px rgba(255,255,255,0.3);
            border: 3px solid rgba(255,255,255,0.2);
        }

        /* إضافة نص ثانوي للعملة */
        .side span {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .dex {
            background: radial-gradient(circle at 30% 30%, #4affff, #0055aa);
            transform: rotateY(0deg);
        }

        .nine {
            background: radial-gradient(circle at 30% 30%, #ff5577, #990022);
            transform: rotateY(180deg);
        }

        /* تحسين الزر */
        .button-container {
            display: flex;
            gap: 20px;
            margin-top: 35px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 16px 50px;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(45deg, #00eaff, #00aaff);
            color: #000;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(0,234,255,0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-width: 180px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 35px rgba(0,234,255,0.7);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* زر إعادة التعيين */
        .reset-btn {
            background: linear-gradient(45deg, #ffaa00, #ff7700);
            box-shadow: 0 10px 25px rgba(255,170,0,0.5);
            min-width: 60px;
            padding: 16px 25px;
        }

        /* رسالة النتيجة */
        .result-message {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
            min-height: 40px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .result-message.show {
            opacity: 1;
        }

        /* العدسة المكبرة */
        @media (max-width: 1000px) {
            .ad {
                width: 130px;
                font-size: 16px;
            }
            .ad i { font-size: 30px; }
        }

        @media (max-width: 700px) {
            .ad { display: none; } /* إخفاء الإعلانات في الشاشات الصغيرة */
            .coin { width: 220px; height: 220px; }
            .side { font-size: 50px; }
        }

        /* مؤشر التحميل */
        .flip-counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            color: #00eaff;
            border: 1px solid #00eaff;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- الإعلانات المحسّنة -->
    <div class="ad ad-left">
        <i class="fas fa-bullhorn"></i>
        مساحة إعلانية
        <span style="color: gold; font-size: 28px;">89$</span>
        <small>فقط لفترة محدودة</small>
    </div>

    <div class="ad ad-right">
        <i class="fas fa-crown"></i>
        إعلان VIP
        <span style="color: gold; font-size: 28px;">89$</span>
        <small>لا تفوّت الفرصة</small>
    </div>

    <div class="center">
        <!-- الشعار -->
        <img src="https://i.postimg.cc/j5d9P1gF/dda42797-92c6-437f-9b3c-8fb1117e0655-fullsize.jpg" 
             alt="شعار DEX vs 89" 
             class="logo"
             onerror="this.src='https://via.placeholder.com/250x100?text=DEX+vs+89'">

        <!-- العملة -->
        <div class="coin-container">
            <div class="coin" id="coin" onclick="flipCoin()">
                <div class="side dex">
                    DEX
                    <span>vs</span>
                </div>
                <div class="side nine">
                    89
                    <span>VIP</span>
                </div>
            </div>
        </div>

        <!-- الأزرار -->
        <div class="button-container">
            <button onclick="flipCoin()" id="flipBtn">
                <i class="fas fa-play" style="margin-left: 8px;"></i>
                FLIP
            </button>
            <button onclick="resetCoin()" class="reset-btn" id="resetBtn" title="إعادة التعيين">
                <i class="fas fa-undo-alt"></i>
            </button>
        </div>

        <!-- رسالة النتيجة -->
        <div class="result-message" id="resultMessage"></div>
    </div>

    <!-- مؤشر عدد مرات اللعب -->
    <div class="flip-counter" id="flipCounter">
        <i class="fas fa-coins"></i> <span id="counterValue">0</span>
    </div>

    <!-- المؤثرات الصوتية -->
    <audio id="flipSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-coin-flip-1933.mp3" type="audio/mpeg">
    </audio>
    <audio id="winSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-video-game-win-2016.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-interface-click-1126.mp3" type="audio/mpeg">
    </audio>

    <script>
        // متغيرات محسّنة
        let totalRotation = 0;
        let flipCount = 0;
        let isFlipping = false;
        let currentResult = null;

        // عناصر DOM
        const coin = document.getElementById("coin");
        const flipBtn = document.getElementById("flipBtn");
        const resetBtn = document.getElementById("resetBtn");
        const resultMsg = document.getElementById("resultMessage");
        const counterSpan = document.getElementById("counterValue");
        
        // العناصر الصوتية
        const flipSound = document.getElementById("flipSound");
        const winSound = document.getElementById("winSound");
        const clickSound = document.getElementById("clickSound");

        // تهيئة الأصوات (لتفادي تأخر التشغيل)
        flipSound.load();
        winSound.load();
        clickSound.load();

        // دالة التقليب الرئيسية
        function flipCoin() {
            if (isFlipping) return; // منع التكرار أثناء الدوران

            // تشغيل صوت النقر
            playSound(clickSound);

            // بدء التقليب
            isFlipping = true;
            flipBtn.disabled = true;
            resetBtn.disabled = true;

            // زيادة عداد المحاولات
            flipCount++;
            counterSpan.textContent = flipCount;

            // تشغيل صوت التقليب
            playSound(flipSound);

            // تحديد النتيجة العشوائية
            const result = Math.random() < 0.5 ? 0 : 180; // 0 = DEX, 180 = 89
            
            // حساب الدوران (5 لفات كاملة + النتيجة)
            totalRotation += 1800 + result; // 5 * 360 = 1800

            // تطبيق التحويل
            coin.style.transform = `rotateY(${totalRotation}deg)`;

            // عرض رسالة "جاري التقليب..."
            resultMsg.textContent = "🔄 جاري التقليب...";
            resultMsg.style.color = "#00eaff";
            resultMsg.classList.add("show");

            // بعد انتهاء الدوران (3.2 ثانية)
            setTimeout(() => {
                // تحديد الفائز
                const finalRotation = (totalRotation / 180) % 2;
                const isDexWinner = (finalRotation >= 0.5 && finalRotation < 1.5) ? false : true;
                
                currentResult = isDexWinner ? "DEX" : "89";
                
                // عرض النتيجة
                resultMsg.textContent = `🎉 النتيجة: ${currentResult} 🎉`;
                resultMsg.style.color = isDexWinner ? "#00eaff" : "#ff5577";
                
                // تشغيل صوت الفوز
                playSound(winSound);

                // تغيير لون مؤقت للعملة
                coin.style.filter = "drop-shadow(0 0 30px gold)";
                setTimeout(() => {
                    coin.style.filter = "none";
                }, 500);

                // إعادة تمكين الأزرار
                isFlipping = false;
                flipBtn.disabled = false;
                resetBtn.disabled = false;
            }, 3200); // مطابق لزمن transition
        }

        // دالة إعادة التعيين
        function resetCoin() {
            if (isFlipping) return;

            playSound(clickSound);

            totalRotation = 0;
            flipCount = 0;
            counterSpan.textContent = flipCount;
            
            coin.style.transform = `rotateY(0deg)`;
            
            resultMsg.textContent = "";
            resultMsg.classList.remove("show");
            
            currentResult = null;
        }

        // دالة مساعدة لتشغيل الصوت
        function playSound(audioElement) {
            try {
                audioElement.currentTime = 0;
                audioElement.play().catch(e => {
                    console.log("لم يتم تشغيل الصوت بسبب قيود المتصفح:", e);
                });
            } catch (e) {
                console.log("خطأ في تشغيل الصوت:", e);
            }
        }

        // إضافة إمكانية التقليب بالضغط على العملة نفسها
        coin.addEventListener('click', flipCoin);

        // منع النقر المتكرر
        coin.addEventListener('dblclick', (e) => e.preventDefault());

        // إظهار رسالة ترحيبية
        window.addEventListener('load', () => {
            console.log('مرحباً بك في لعبة DEX vs 89!');
        });

        // حفظ الحالة في localStorage (اختياري)
        function saveState() {
            // يمكن إضافة حفظ الحالة إذا أردت
        }
    </script>
</body>
</html>
